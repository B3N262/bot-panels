<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Bot Control Panel</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #2f3136; color: white; text-align: center; }
        .card { background: #36393f; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-top: 20px; }
        button { padding: 12px 24px; font-size: 16px; background: #5865F2; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        input, select { padding: 12px; width: 90%; margin: 10px 0; border-radius: 5px; border: 1px solid #202225; background: #40444b; color: white; font-size: 16px; }
        .status-tag { font-weight: bold; }
    </style>
</head>
<body>

    <h2>My Discord Bots App</h2>
    
    <div class="card">
        <h3>System Monitor</h3>
        <p>Bot 1 Status: <span id="bot1Status" class="status-tag">Checking...</span></p>
        <p>Bot 2 Status: <span id="bot2Status" class="status-tag">Checking...</span></p>
    </div>

    <div class="card">
        <h3>Send Live Message</h3>
        <label for="botSelect">Choose Bot:</label>
        <select id="botSelect">
            <option value="1">Bot 1</option>
            <option value="2">Bot 2</option>
        </select>
        
        <input type="text" id="channelId" placeholder="Paste Discord Channel ID">
        <input type="text" id="message" placeholder="Type message here...">
        <button onclick="sendMessage()">Send Message</button>
    </div>

    <script>
        // Your live Render URL pasted here!
        const BACKEND_URL = "https://my-discord-bot-g5hy.onrender.com"; 

        async function checkStatus() {
            try {
                const res = await fetch(`${BACKEND_URL}/status`);
                const data = await res.json();
                
                document.getElementById('bot1Status').innerText = data.bot1Status;
                document.getElementById('bot1Status').style.color = data.bot1Status === "Online" ? "#3ba55d" : "#faa81a";
                
                document.getElementById('bot2Status').innerText = data.bot2Status;
                document.getElementById('bot2Status').style.color = data.bot2Status === "Online" ? "#3ba55d" : "#faa81a";
            } catch {
                document.getElementById('bot1Status').innerText = "Sleeping/Offline";
                document.getElementById('bot2Status').innerText = "Sleeping/Offline";
                document.getElementById('bot1Status').style.color = "#faa81a";
                document.getElementById('bot2Status').style.color = "#faa81a";
            }
        }

        async function sendMessage() {
            const botNumber = parseInt(document.getElementById('botSelect').value);
            const channelId = document.getElementById('channelId').value;
            const message = document.getElementById('message').value;

            if(!channelId || !message) return alert("Please fill out all fields");

            try {
                const res = await fetch(`${BACKEND_URL}/send-message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channelId, message, botNumber })
                });
                const data = await res.json();
                alert(data.status || data.error);
            } catch (err) {
                alert("Could not reach backend server.");
            }
        }

        // Check status every 10 seconds
        setInterval(checkStatus, 10000);
        checkStatus();
    </script>
</body>
</html>
